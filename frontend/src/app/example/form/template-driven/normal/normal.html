<div class="flex gap-10 items-start">
  <form #form="ngForm" (ngSubmit)="submit(form)" class="flex flex-col gap-3 w-[500px]">
    <div>
      <div class="flex flex-col gap-2">
        <input
          type="text"
          name="email"
          placeholder="Email"
          [(ngModel)]="model.email"
          required
          email
          #email="ngModel"
          class="input w-full h-[40px] bg-background dark:bg-dark-background border border-border dark:border-dark-border text-black dark:text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary transition duration-200"
        />

        @if (email.touched && email.invalid) {
          <span class="text-red-500">Email inválido</span>
        }
      </div>
    </div>

    <div>
      <div class="flex flex-col gap-2">
        <input
          type="password"
          name="password"
          placeholder="Password"
          [(ngModel)]="model.password"
          required
          minlength="8"
          #password="ngModel"
          class="input w-full h-[40px] bg-background dark:bg-dark-background border border-border dark:border-dark-border text-black dark:text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary transition duration-200"
        />

        @if (password.touched && password.invalid) {
          <span class="text-red-500">Password inválido</span>
        }
      </div>
    </div>

    <JButton type="submit" classes="primary">Submit</JButton>
  </form>

  <div class="w-full p-4 border rounded bg-gray-100 dark:bg-gray-800">
    <h3 class="font-bold mb-2">Resultado:</h3>

    @if (result) {
      <pre>{{ result | json }}</pre>
    } @else {
      <span class="text-gray-400">Aun no hay datos</span>
    }
  </div>
</div>
