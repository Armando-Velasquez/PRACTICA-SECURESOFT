<div class="flex gap-10 items-start">
  <form #form="ngForm" (ngSubmit)="submit(form)" class="flex flex-col gap-3 w-[500px]">
    @for (phone of phones; track $index) {
      <div>
        <input
          type="text"
          name="phone{{ $index }}"
          [(ngModel)]="phones[$index]"
          placeholder="Telefono"
          required
          #p="ngModel"
          class="input w-full h-[40px] bg-background dark:bg-dark-background border border-border dark:border-dark-border text-black dark:text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary transition duration-200"
        />

        @if (p.touched && p.invalid) {
          <span class="text-red-500">Telefono inválido</span>
        }
      </div>
    }

    <div class="flex gap-2">
        <JButton type="button" classes="primary" (clicked)="addPhone()">Agregar</JButton>
        <JButton type="submit" classes="primary">Enviar</JButton>
    </div>

  </form>

  <div class="w-full p-4 border rounded bg-gray-100 dark:bg-gray-800">
    <h3 class="font-bold mb-2">Resultado:</h3>

    @if (result) {
      <pre>{{ result | json }}</pre>
    } @else {
      <span class="text-gray-400">Aun no hay datos</span>
    }
  </div>
</div>
