<div class="flex flex-col gap-4 w-[500px]">
  <form [formGroup]="form" class="flex flex-col gap-2">
    <input
      type="text"
      placeholder="Escribe algo"
      formControlName="comment"
      (input)="update()"
      class="border p-2 rounded"
    />
  </form>

  <!-- Seguro -->
  <div class="border p-3">
    <h3>SEGURO (ANGULAR)</h3>
    <div>{{ form.get('comment')?.value }}</div>
  </div>

  <!-- Riesgo -->
  <div class="border p-3">
    <h3>RIESGO (HTML)</h3>
    <div [innerHTML]="rawHtml"></div>
  </div>

  <!-- Forzada -->
  <div class="border p-3">
    <h3>RIESGO (FORZADA)</h3>
    <div [innerHTML]="unsafeHtml"></div>
  </div>
</div>
