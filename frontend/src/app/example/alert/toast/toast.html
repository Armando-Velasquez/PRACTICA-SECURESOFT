<span class="font-bold">ALERT TOAST</span>

<div class="flex gap-2">
    <JButton (clicked)="onAlertToast1()" classes="success">SUCCESS</JButton>    
    <JButton (clicked)="onAlertToast2()" classes="error">ERROR</JButton>    
    <JButton (clicked)="onAlertToast3()" classes="info">INFO</JButton>    
    <JButton (clicked)="onAlertToast4()" classes="warning">WARNING</JButton>    
    <JButton (clicked)="onAlertToast5()" classes="loading">LOADING</JButton>    
    <JButton (clicked)="onAlertToast6()" classes="question">QUESTION</JButton>    
</div>
